- aid: streaming:aws-kinesis
  name: Amazon Kinesis
  description: >-
    AWS managed family for real-time streaming: Kinesis Data Streams
    (shards, partition keys, 24h–365d retention), Kinesis Data Firehose
    (delivery to S3/Redshift/OpenSearch), and Kinesis Video Streams for
    media. HTTP/2 SubscribeToShard for low-latency consumers.
  humanURL: https://aws.amazon.com/kinesis/
  tags:
  - Streaming
  - AWS
  - Managed
  properties:
  - type: Documentation
    url: https://docs.aws.amazon.com/kinesis/
  - type: Topic
    url: https://github.com/api-evangelist/amazon-kinesis
- aid: streaming:gcp-pubsub
  name: Google Cloud Pub/Sub and Dataflow
  description: >-
    GCP's managed messaging (Pub/Sub) and stream-processing (Dataflow,
    built on Apache Beam) stack. Pub/Sub provides at-least-once and
    exactly-once delivery with push/pull subscribers; Dataflow runs
    windowed, watermark-aware Beam pipelines.
  humanURL: https://cloud.google.com/pubsub
  tags:
  - Streaming
  - GCP
  - Managed
  properties:
