apis:
- aid: streaming:apache-kafka
  name: Apache Kafka
  description: >-
    Distributed, partitioned, replicated log. The reference open-source
    streaming platform; durable, ordered topics with consumer groups, exactly
    -once semantics, and the de facto wire protocol for the streaming
    ecosystem. Native Kafka clients and a REST proxy expose the broker.
  humanURL: https://kafka.apache.org
  tags:
  - Streaming
  - Log
  - Open Source
  - Apache Software Foundation
  properties:
  - type: Documentation
    url: https://kafka.apache.org/documentation/
  - type: GitHubRepository
    url: https://github.com/apache/kafka
  - type: Topic
    url: https://github.com/api-evangelist/apache-kafka
- aid: streaming:apache-pulsar
  name: Apache Pulsar
  description: >-
    Cloud-native, multi-tenant pub/sub and streaming platform with a tiered
    storage architecture (BookKeeper) that separates compute from storage,
    native geo-replication, and built-in Functions for lightweight stream
    processing.
  humanURL: https://pulsar.apache.org
  tags:
  - Streaming
  - Pub Sub
  - Open Source
  - Apache Software Foundation
  properties:
  - type: Documentation
    url: https://pulsar.apache.org/docs/
  - type: GitHubRepository
    url: https://github.com/apache/pulsar
  - type: Topic
    url: https://github.com/api-evangelist/apache-pulsar
- aid: streaming:redpanda
  name: Redpanda
  description: >-
    Kafka-API-compatible streaming platform implemented in C++ with no
    ZooKeeper/JVM dependency. Single binary, thread-per-core architecture,
    Raft consensus; positioned as a drop-in for Kafka workloads.
  humanURL: https://redpanda.com
  tags:
  - Streaming
  - Kafka Compatible
  - Open Source
  properties:
  - type: Documentation
    url: https://docs.redpanda.com
  - type: GitHubRepository
    url: https://github.com/redpanda-data/redpanda
- aid: streaming:nats-jetstream
  name: NATS JetStream
  description: >-
    Persistence layer for the NATS messaging system providing at-least-once
    and exactly-once streaming, key/value and object stores, and durable
    consumers — designed for edge, IoT, and microservice topologies.
  humanURL: https://nats.io/
  tags:
  - Streaming
  - Messaging
  - Open Source
  - CNCF
  properties:
  - type: Documentation
    url: https://docs.nats.io/nats-concepts/jetstream
  - type: GitHubRepository
