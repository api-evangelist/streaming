aid: streaming
name: Streaming
description: >-
  Streaming is a topic catalog of the protocols, platforms, and processing
  engines used to move and transform real-time, high-volume, often bidirectional
  data over the network. It indexes the canonical log-structured and broker
  systems (Apache Kafka, Apache Pulsar, Redpanda, NATS JetStream, AWS Kinesis,
  GCP Pub/Sub + Dataflow, Azure Event Hubs, Confluent Cloud, StreamNative),
  the over-the-wire streaming protocols exposed to API consumers (Server-Sent
  Events, WebSocket, gRPC streaming, GraphQL subscriptions), the change-data
  capture and connector frameworks that feed them (Kafka Connect, Debezium),
  and the stream-processing engines that consume them (Apache Flink, Spark
  Structured Streaming, Materialize, Tinybird, Bytewax, Apache Beam). This
  topic is distinguished from `events` and `async-apis`: streaming emphasizes
  real-time, high-throughput, partitioned, and often bidirectional pipes,
  rather than discrete event envelopes or static contract documents.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Streaming
- Real Time
- Event Streaming
- Change Data Capture
- Stream Processing
- Server Sent Events
- WebSocket
- gRPC
- GraphQL Subscriptions
- Kafka
- Pulsar
