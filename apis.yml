- aid: streaming:azure-event-hubs
  name: Azure Event Hubs
  description: >-
    Microsoft's managed big-data streaming platform; Kafka-protocol
    compatible, partitioned, with Capture (delivery to ADLS/Blob) and
    tight integration with Azure Stream Analytics and Functions.
  humanURL: https://azure.microsoft.com/en-us/products/event-hubs/
  tags:
  - Streaming
  - Azure
  - Kafka Compatible
  properties:
  - type: Documentation
    url: https://learn.microsoft.com/en-us/azure/event-hubs/
- aid: streaming:confluent-cloud
  name: Confluent Cloud
