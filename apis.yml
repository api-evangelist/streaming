  tags:
  - Streaming
  - Pulsar
  - Managed
  properties:
  - type: Documentation
    url: https://docs.streamnative.io
- aid: streaming:server-sent-events
  name: Server-Sent Events (SSE)
  description: >-
    One-directional HTTP-based streaming from server to client using the
    `text/event-stream` media type. Defined by the HTML Living Standard
    EventSource API; widely used for LLM token streams, dashboards, and
    live feeds where bidirectionality is not required.
  humanURL: https://html.spec.whatwg.org/multipage/server-sent-events.html
  tags:
  - Streaming
  - HTTP
  - Protocol
  - Standard
  properties:
  - type: Documentation
    url: https://html.spec.whatwg.org/multipage/server-sent-events.html
  - type: Documentation
    url: https://developer.mozilla.org/en-US/docs/Web/API/Server-sent_events
- aid: streaming:websocket
  name: WebSocket
  description: >-
    Full-duplex, bidirectional streaming protocol over a single TCP
    connection, upgraded from HTTP. RFC 6455. Foundation for chat,
    collaborative apps, market data, and real-time control planes.
  humanURL: https://datatracker.ietf.org/doc/html/rfc6455
  tags:
  - Streaming
  - Protocol
  - Standard
  - IETF
  properties:
  - type: Documentation
    url: https://datatracker.ietf.org/doc/html/rfc6455
  - type: Documentation
    url: https://developer.mozilla.org/en-US/docs/Web/API/WebSockets_API
- aid: streaming:grpc-streaming
  name: gRPC Streaming
  description: >-
    gRPC defines four RPC styles, three of which are streaming: server
    streaming, client streaming, and bidirectional streaming, all multiplexed
    over HTTP/2. The default streaming surface for service-to-service
    systems and Kubernetes-native APIs.
  humanURL: https://grpc.io
  tags:
  - Streaming
  - Protocol
  - HTTP2
  - CNCF
  properties:
  - type: Documentation
    url: https://grpc.io/docs/what-is-grpc/core-concepts/
  - type: GitHubRepository
    url: https://github.com/grpc/grpc
- aid: streaming:graphql-subscriptions
  name: GraphQL Subscriptions
  description: >-
    The GraphQL operation type for receiving a stream of updates over a
    long-lived transport (typically WebSocket via the graphql-ws or
    graphql-transport-ws sub-protocols, or SSE). Used to push schema-
    defined deltas to clients.
  humanURL: https://spec.graphql.org/draft/#sec-Subscription
  tags:
  - Streaming
  - GraphQL
  - Standard
  properties:
