    Managed Kafka by the original Kafka authors. Cluster, topic, connector,
    KSQL, Schema Registry, Stream Governance, and Flink offerings exposed
    via a Confluent Cloud REST API and Terraform provider.
  humanURL: https://www.confluent.io/confluent-cloud/
  tags:
  - Streaming
  - Kafka
  - Managed
  properties:
  - type: Documentation
    url: https://docs.confluent.io/cloud/current/overview.html
  - type: Topic
    url: https://github.com/api-evangelist/confluent-the-data-streaming-platform
- aid: streaming:streamnative
  name: StreamNative
  description: >-
    Managed Apache Pulsar as a service from Pulsar's original contributors,
